<!DOCTYPE html><html><head><title>Clases del Destino</title><style>body{margin:0;background:#222;color:#fff;font:20px monospace;}</style></head><body><canvas id=c width=400 height=400></canvas><script>var c=document.getElementById('c'),ctx=c.getContext('2d'),w=400,h=400,scale=1;ctx.imageSmoothingEnabled=!1;var state='menu',player={cls:0,hp:100,mhp:100,atk:10,def:5,mp:50,mmp:50,lvl:1,xp:0,xpm:100,pots:3},classes=[{n:'Guerrero',mhp:150,atk:15,def:10,mmp:30,s:'Taunt (daño+20)'},{n:'Mago',mhp:80,atk:8,def:3,mmp:100,s:'Bola Fuego (daño mágico 25)'},{n:'Pícaro',mhp:110,atk:12,def:6,mmp:50,s:'Puñalada (crítico 2x)'}],enemy={hp:0,mhp:0,atk:8,def:4,name:'Goblin'},battle=0,turn='p',msg='¡Elige tu clase!',xpPerBattle=50;function initPlayer(){var cl=classes[player.cls];player.mhp=cl.mhp,player.atk=cl.atk,player.def=cl.def,player.mmp=cl.mmp,player.hp=player.mhp,player.mp=player.mmp,player.xp=0,player.lvl=1,player.pots=3;}function nextBattle(){battle++;var names=['Goblin','Orco','Troll','Dragón','Rey Demonio'],hp=50+battle*30,atk=6+battle*2;if(battle==5){hp=200,atk=15;}enemy.name=names[battle>4?4:battle],enemy.mhp=enemy.hp=hp,enemy.atk=atk,enemy.def=2+battle,turn='p',msg='¡Nueva batalla!';}function levelUp(){if(player.xp>=player.xpm){player.lvl++;player.xpm+=100;player.mhp+=20,player.hp=player.mhp;player.atk+=2;msg='¡Level Up!';}}function dmg(a,t){return Math.max(1,Math.floor((a.atk+Math.random()*5)-(t.def+Math.random()*2)));}function drawRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}function drawText(t,x,y,c){ctx.fillStyle=c||'#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';ctx.fillText(t,x,y);}function drawHP(x,y,w,h,v,mv,c1,c2){drawRect(x,y,w,h,'#333');drawRect(x,y,w*(mv>0?v/mv:0),h,c1);drawRect(x+w-2,y,2,h,'#000');}function draw(){ctx.fillStyle='#111';ctx.fillRect(0,0,w,h);if(state=='menu'){drawText('Clases del Destino',200,60,'#0ff');for(var i=0;i<3;i++){var y=120+i*60,x=50,w=300,h=50;drawRect(x,y,w,h,i==player.cls?'#0a0':'#444');drawText(classes[i].n,200,y+30);}drawText('Click para elegir. ENTER para empezar.',200,380);}else if(state=='battle'){drawText('Batalla '+ (battle+1) +' vs '+enemy.name,200,40);drawHP(50,60,150,20,player.hp,player.mhp,'#0a0');drawHP(200,60,150,20,enemy.hp,enemy.mhp,'#a00');drawText('LVL:'+player.lvl+' XP:'+player.xp+'/'+player.xpm,200,100);drawText('Pots:'+player.pots,350,100);drawText(player.cls==0?'Guerrero':player.cls==1?'Mago':'Pícaro' +' HP:'+player.hp+'/'+player.mhp,200,130);drawText('ATK:'+player.atk+' DEF:'+player.def+' MP:'+player.mp+'/'+player.mmp,200,150);drawText(msg,200,200);var bx=50,by=230,bw=80,bh=40;['Ataque','Skill','Poción','Huir'].forEach((t,i)=>{drawRect(bx+i*(bw+10),by,bw,bh,'#444');drawText(t,bx+(i*bw+(bw/2)),by+bh/2-5);});drawText(turn=='p'?'Tu turno':'Turno Enemigo',200,380,'#ff0');}requestAnimationFrame(draw);}function playerAttack(){var d=dmg(player,enemy);enemy.hp-=d;msg='¡Daño '+d+'!';player.xp+=xpPerBattle;if(enemy.hp<=0){msg='¡Enemigo derrotado!';setTimeout(()=>{if(battle==4){state='win';msg='¡Victoria! Rey Demonio caído.';}else{nextBattle();}},1500);}else{turn='e';}}function playerSkill(){if(player.mp<20){msg='¡Sin MP!';return;}player.mp-=20;var d;if(player.cls==0){d=dmg(player,enemy)+20;}else if(player.cls==1){d=25;}else{d=dmg(player,enemy)*2;}enemy.hp-=d;msg=(player.cls==0?'Taunt!':'Bola Fuego!'||'Puñalada!')+' Daño '+d+'!';player.xp+=xpPerBattle;if(enemy.hp<=0){msg='¡Enemigo derrotado!';setTimeout(()=>{if(battle==4){state='win';msg='¡Victoria!';}else{nextBattle();}},1500);}else{turn='e';}}function playerPotion(){if(player.pots<=0){msg='¡Sin pociones!';return;}player.pots--;player.hp=Math.min(player.mhp,player.hp+30);msg='¡+30 HP!';turn='e';}function enemyTurn(){var d=dmg(enemy,player);player.hp-=d;if(player.hp<=0){msg='¡Derrota! Reiniciando...';setTimeout(()=>{state='menu';initPlayer();battle=0;},1500);}else{msg='Enemigo ataca! Daño '+d;turn='p';}}c.onclick=e=>{var rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;if(state=='menu'){if(my>120&&my<380){player.cls=Math.floor((mx-50)/310*3);}}else if(state=='battle'&&turn=='p'){var bx=50,by=230,bw=90;if(my>by&&my<by+40){var idx=Math.floor((mx-bx)/100);if(idx==0){playerAttack();}else if(idx==1){playerSkill();}else if(idx==2){playerPotion();}else{state='menu';}}}};document.onkeydown=e=>{if(e.key=='Enter'&&state=='menu'){initPlayer();nextBattle();state='battle';}};draw();</script></body></html>
